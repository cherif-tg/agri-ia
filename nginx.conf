# Configuration Nginx pour Prévision Agricole IA
# Placer dans: /etc/nginx/sites-available/agri-ia-prevision

upstream streamlit {
    server 127.0.0.1:8501;
}

# Redirection HTTP vers HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name agri-ia-prevision.tg www.agri-ia-prevision.tg;

    # Certificat Let's Encrypt
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Rediriger vers HTTPS
    location / {
        return 301 https://$server_name$request_uri;
    }
}

# Configuration HTTPS
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    
    server_name agri-ia-prevision.tg www.agri-ia-prevision.tg;

    # Certificats SSL Let's Encrypt
    ssl_certificate /etc/letsencrypt/live/agri-ia-prevision.tg/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/agri-ia-prevision.tg/privkey.pem;

    # Configuration SSL sécurisée
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # Headers de sécurité
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;

    # Root et logs
    root /var/www/html;
    access_log /var/log/nginx/agri-ia_access.log;
    error_log /var/log/nginx/agri-ia_error.log;

    # Taille max upload
    client_max_body_size 200M;

    # Proxy Streamlit
    location / {
        proxy_pass http://streamlit;
        proxy_http_version 1.1;
        
        # Headers WebSocket
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        
        # Headers généraux
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Timeouts
        proxy_connect_timeout 7d;
        proxy_send_timeout 7d;
        proxy_read_timeout 7d;
        
        # Buffering
        proxy_buffering off;
    }

    # Cache static files
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg)$ {
        expires 1d;
        add_header Cache-Control "public, immutable";
    }

    # Deny access to sensitive files
    location ~ /\. {
        deny all;
    }

    location ~ ~/.env {
        deny all;
    }
}
